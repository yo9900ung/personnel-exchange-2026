<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="정부 안내서비스 24건을 검색하고 안내분야별로 필터링할 수 있는 페이지입니다.">
  <title>정부 안내서비스 찾기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#service-results">서비스 목록으로 바로가기</a>

  <header class="site-header">
    <div class="header-inner">
      <p class="eyebrow">시민 맞춤 안내</p>
      <h1>정부 안내서비스 찾기</h1>
      <p class="header-description">
        필요한 서비스명을 검색하거나 안내분야를 선택하면 관련 정보를 빠르게 확인할 수 있습니다.
      </p>
    </div>
  </header>

  <main>
    <section class="filter-panel" aria-label="서비스 검색 및 필터">
      <div class="form-field">
        <label for="service-search">서비스명 검색</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input
            id="service-search"
            type="search"
            placeholder="예: 연금, 교육, 세금"
            autocomplete="off"
          >
        </div>
      </div>

      <div class="form-field">
        <label for="category-filter">안내분야</label>
        <select id="category-filter">
          <option value="전체">전체 분야</option>
          <option value="민원">민원</option>
          <option value="복지">복지</option>
          <option value="세금">세금</option>
          <option value="교통">교통</option>
          <option value="재난">재난</option>
          <option value="일자리">일자리</option>
          <option value="교육">교육</option>
        </select>
      </div>

      <button id="reset-button" class="reset-button" type="button">검색 초기화</button>
    </section>

    <section id="service-results" aria-labelledby="result-count">
      <div class="summary-row">
        <p id="result-count" class="result-count" aria-live="polite"></p>
        <p class="result-hint">서비스명과 안내분야 조건이 동시에 적용됩니다.</p>
      </div>

      <div id="table-card" class="table-card">
        <table>
          <caption class="skip-link">정부 안내서비스 검색 결과</caption>
          <thead>
            <tr>
              <th scope="col">서비스명</th>
              <th scope="col">안내분야</th>
              <th scope="col">소관기관</th>
              <th scope="col">온라인안내</th>
              <th scope="col">콜센터</th>
            </tr>
          </thead>
          <tbody id="service-table-body"></tbody>
        </table>
      </div>

      <div id="mobile-list" class="mobile-list" aria-label="모바일 서비스 목록"></div>

      <div id="empty-state" class="empty-state" role="status">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <h2>검색 결과가 없습니다.</h2>
        <p>검색어 또는 안내분야를 변경해 주세요.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    정부 안내서비스 목록 24건 기준
  </footer>

  <script src="app.js"></script>
</body>
</html>
